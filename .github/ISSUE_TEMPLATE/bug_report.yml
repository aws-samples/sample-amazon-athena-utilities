name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: input
    id: aws-region
    attributes:
      label: AWS Region
      description: Which AWS region are you deploying to?
      placeholder: us-east-1
    validations:
      required: true

  - type: input
    id: template-version
    attributes:
      label: Template Version
      description: Which version of the CloudFormation template are you using?
      placeholder: v1.0.0
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Deploy template with parameters...
        2. Execute Step Function...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: parameters
    attributes:
      label: CloudFormation Parameters
      description: What parameters did you use when deploying?
      placeholder: |
        WorkgroupName: primary
        InitialCapacity: 24
        StartImmediately: true
    validations:
      required: false

  - type: textarea
    id: error-logs
    attributes:
      label: Error Messages/Logs
      description: Include any error messages, CloudFormation events, or Step Functions logs
      placeholder: Paste error messages here...
    validations:
      required: false

  - type: dropdown
    id: deployment-method
    attributes:
      label: Deployment Method
      description: How did you deploy the template?
      options:
        - AWS Console
        - AWS CLI
        - AWS CDK
        - Other (specify in description)
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues for duplicates
          required: true
        - label: I have provided all requested information
          required: true
        - label: I have removed any sensitive information from logs
          required: true
